<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄變裝鏡：轉念大挑戰</title>
    <style>
        :root {
            --primary-gold: #ffd700;
            --danger-red: #ff4d4d;
            --lava-orange: #ff5722;
            --peace-blue: #a2d2ff;
            --success-green: #4caf50;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        #game-container {
            width: 350px; height: 600px;
            background: white; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; display: flex; flex-direction: column;
            padding: 20px; text-align: center;
            transition: transform 0.1s;
        }
        #scene-image {
            width: 100%; height: 180px;
            background-color: #ffebee; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 70px; position: relative; transition: 0.5s;
        }
        .spark {
            position: absolute; font-size: 24px;
            animation: flash 0.6s infinite;
        }
        @keyframes flash { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0; transform: scale(0.8); } }
        
        #dialog-box {
            margin: 20px 0; padding: 15px;
            border: 2px solid #eee; border-radius: 10px;
            min-height: 120px; background: #fafafa;
            font-size: 18px; line-height: 1.6; display: flex; align-items: center; justify-content: center;
        }
        .controls { display: flex; flex-direction: column; gap: 12px; }
        button {
            padding: 15px; border: none; border-radius: 30px;
            background: var(--peace-blue); cursor: pointer;
            font-size: 16px; font-weight: bold; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { transform: translateY(-2px); filter: brightness(0.9); }
        .hero-btn { background: var(--primary-gold); color: #444; }
        .hidden { display: none !important; }
        
        /* 火山爆發特效 (選錯時) */
        .volcano-active {
            animation: shake 0.2s infinite;
            background-color: #331111 !important;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(1px, -1px) rotate(1deg); }
            80% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        #volcano-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.4);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 150; border-radius: 20px; pointer-events: none;
        }

        /* 慶祝大畫面 (選對時) */
        #celebration-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #fff9c4 0%, #ffffff 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-radius: 20px; z-index: 200; padding: 20px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .super-mom { font-size: 100px; margin-bottom: 20px; animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .confetti { position: absolute; width: 10px; height: 10px; animation: fall 3s linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(600px) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div style="font-size: 14px; color: #888; margin-bottom: 10px;">《心靈的神奇潤滑劑》互動練習</div>
    
    <div id="scene-image">
        <span id="char-emoji">😫</span>
        <div id="sparks-container"></div>
    </div>

    <div id="dialog-box">
        <p id="dialog-text">厚！媽媽！你是不是弄丟我的金色彩色筆了！你每次都亂動我東西！</p>
    </div>

    <div id="step1-controls" class="controls">
        <button class="hero-btn" onclick="goToStep2()">✨ 開啟變裝鏡 (轉念一秒鐘)</button>
    </div>

    <div id="step2-controls" class="controls hidden">
        <p style="color: #666;">想像你要對誰說話？</p>
        <button onclick="chooseHero('校長')">👨‍💼 敬愛的校長</button>
        <button onclick="chooseHero('超人')">🦸‍♂️ 超人英雄</button>
    </div>

    <div id="step3-controls" class="controls hidden">
        <p style="color: #666;">身為 <span id="current-hero" style="font-weight:bold; color:orange;"></span>，你會怎麼說？</p>
        <button onclick="checkAnswer(false)">「快把筆給我！」</button>
        <button onclick="checkAnswer(true)">「請幫幫我，我找不到筆了。」</button>
    </div>

    <div id="volcano-overlay" class="hidden">
        <div style="font-size: 100px;">🌋</div>
        <h1 style="color: white; text-shadow: 2px 2px 5px black;">火山爆發！</h1>
        <p style="color: white; font-weight: bold;">火藥味太重了！</p>
    </div>

    <div id="celebration-overlay" class="hidden">
        <div class="super-mom">👩‍🎤👍</div>
        <h1 style="color: #f57c00; margin: 5px 0 15px 0;">和諧達成！</h1>
        <p style="font-size: 18px; color: #333; line-height: 1.6; margin-bottom: 30px;">
            <b>太棒了！家裡的火藥味消失了！</b><br>
            你成功使用了「恭敬心」潤滑劑，<br>
            媽媽現在是你的<b>「神隊友」</b>！
        </p>
        <button onclick="location.reload()" style="background: var(--success-green); color: white; width: 80%;">再練習一次</button>
    </div>
</div>

<script>
    const sparksContainer = document.getElementById('sparks-container');
    const scene = document.getElementById('scene-image');
    const charEmoji = document.getElementById('char-emoji');
    const dialogText = document.getElementById('dialog-text');
    const gameContainer = document.getElementById('game-container');
    const volcanoOverlay = document.getElementById('volcano-overlay');

    function initSparks() {
        sparksContainer.innerHTML = '';
        for(let i=0; i<8; i++) {
            const span = document.createElement('span');
            span.className = 'spark';
            span.innerText = '💥';
            span.style.left = Math.random() * 85 + '%';
            span.style.top = Math.random() * 85 + '%';
            sparksContainer.appendChild(span);
        }
    }
    initSparks();

    function goToStep2() {
        document.getElementById('step1-controls').classList.add('hidden');
        document.getElementById('step2-controls').classList.remove('hidden');
        dialogText.innerText = "媽媽說：如果你對著最尊敬的人說話，會用剛才那個語氣嗎？";
        charEmoji.innerText = "🤔";
    }

    function chooseHero(heroName) {
        document.getElementById('step2-controls').classList.add('hidden');
        document.getElementById('step3-controls').classList.remove('hidden');
        document.getElementById('current-hero').innerText = heroName;
        charEmoji.innerText = heroName === '校長' ? '👨‍💼' : '🦸‍♂️';
        scene.style.backgroundColor = "#fff9c4"; 
        sparksContainer.innerHTML = ''; 
        dialogText.innerText = "當你有了「恭敬心」，你會怎麼開口呢？";
    }

    function checkAnswer(isCorrect) {
        if(isCorrect) {
            startCelebration();
        } else {
            triggerVolcano();
        }
    }

    function triggerVolcano() {
        // 啟動火山效果
        gameContainer.classList.add('volcano-active');
        volcanoOverlay.classList.remove('hidden');
        charEmoji.innerText = "🌋";
        
        // 3秒後自動恢復，讓孩子可以重選
        setTimeout(() => {
            gameContainer.classList.remove('volcano-active');
            volcanoOverlay.classList.add('hidden');
            charEmoji.innerText = "🤔";
            alert("哎呀！語氣太兇了，火爆的摩擦引發了火山爆發！再試試看溫柔的恭敬語氣？");
        }, 2500);
    }

    function startCelebration() {
        document.getElementById('celebration-overlay').classList.remove('hidden');
        for(let i=0; i<50; i++) {
            setTimeout(() => {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.top = "-10px";
                c.style.backgroundColor = ['#ffd700', '#ff4081', '#00e676', '#2979ff', '#ff9100'][Math.floor(Math.random()*5)];
                gameContainer.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }, i * 50);
        }
    }
</script>

</body>
</html>
